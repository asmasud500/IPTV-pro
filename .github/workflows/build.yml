name: Build IPTV Pro APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.txt; exit ${PIPESTATUS[0]}
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Xmx2g'

      - name: Post errors to Gist
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ERRORS=$(grep -E "^e:|error:|Error |FAILED|Exception|Unresolved reference|BUILD FAILED|> Task :.*FAILED" /tmp/build.txt | head -60 || true)
          TAIL=$(tail -80 /tmp/build.txt)
          CONTENT=$(printf "=== ERRORS ===\n%s\n\n=== LAST 80 LINES ===\n%s" "$ERRORS" "$TAIL")
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/gists" \
            -d "$(python3 -c "
import json,sys
content = open('/tmp/build.txt').read()
errors = [l for l in content.split('\n') if any(x in l for x in ['error:','Error ','FAILED','Exception','Unresolved','BUILD FAILED'])]
output = '=== KEY ERRORS ===\n' + '\n'.join(errors[-50:]) + '\n\n=== LAST 80 LINES ===\n' + '\n'.join(content.split('\n')[-80:])
print(json.dumps({
  'description': 'IPTV-Pro Build Error Log',
  'public': False,
  'files': {'build_error.txt': {'content': output}}
}))
")" > /tmp/gist_response.json
          GIST_URL=$(python3 -c "import json; d=json.load(open('/tmp/gist_response.json')); print(d.get('html_url', d.get('id','ERROR')))")
          echo "Gist: $GIST_URL"
          echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "Error log: $GIST_URL" >> $GITHUB_STEP_SUMMARY

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Pro-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Success
        if: success()
        run: |
          APK_SIZE=$(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)
          echo "## ✅ Build Successful! APK size: $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          ls -lh app/build/outputs/apk/debug/
